name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
        working-directory: core-engine
      - name: Build
        run: cmake --build build -j
        working-directory: core-engine
      - name: Test
        run: ctest --test-dir build --output-on-failure
        working-directory: core-engine
      - name: Bench
        run: .\build\zcmesh_bench.exe 200000
        working-directory: core-engine
      - name: Soak loss (inspect gaps)
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ..\scripts\soak-loss.ps1 -Seconds 4 -Rate 400 -LossPct 15 -ExpectGapsMin 3
        working-directory: core-engine
      - name: Soak failover (C++ only)
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ..\scripts\soak-failover-cpp.ps1 -Seconds 5 -Rate 400
        working-directory: core-engine
      - name: Soak preferred-hop (C++ only)
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ..\scripts\soak-preferred-hop-cpp.ps1 -PhaseSec 3 -Rate 400
        working-directory: core-engine
      - name: Serial 2-hop stamp demo
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ..\scripts\demo-serial-hop.ps1 -Seconds 5 -Rate 400
        working-directory: core-engine
      - name: Soak TCP capture
        run: powershell -NoProfile -ExecutionPolicy Bypass -File ..\scripts\soak-capture-tcp.ps1 -Seconds 5 -Rate 400
        working-directory: core-engine

  core-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
        working-directory: core-engine
      - name: Build
        run: cmake --build build -j
        working-directory: core-engine
      - name: Test
        run: ctest --test-dir build --output-on-failure
        working-directory: core-engine
      - name: Bench
        run: ./build/zcmesh_bench 200000
        working-directory: core-engine
      - name: Soak loss (inspect gaps)
        run: bash ../scripts/soak-loss.sh 15 4 400 3
        working-directory: core-engine
      - name: Soak failover (C++ only)
        run: bash ../scripts/soak-failover-cpp.sh 5 400
        working-directory: core-engine
      - name: Soak preferred-hop (C++ only)
        run: bash ../scripts/soak-preferred-hop-cpp.sh 3 400
        working-directory: core-engine
      - name: Serial 2-hop stamp demo
        run: bash ../scripts/demo-serial-hop.sh 5 400
        working-directory: core-engine
      - name: Soak TCP capture
        run: bash ../scripts/soak-capture-tcp.sh 5 400
        working-directory: core-engine

  operator-node:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Compile
        run: .\gradlew.bat classes --no-daemon
        working-directory: operator-node
      - name: Golden CRC
        run: .\gradlew.bat golden --no-daemon
        working-directory: operator-node
      - name: ZCM roundtrip
        run: .\gradlew.bat zcmRoundtrip --no-daemon
        working-directory: operator-node
      - name: Stream resync
        run: .\gradlew.bat streamResync --no-daemon
        working-directory: operator-node
      - name: Mesh control encode
        run: .\gradlew.bat meshControl --no-daemon
        working-directory: operator-node

  e2e-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Configure core
        run: cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
        working-directory: core-engine
      - name: Build core
        run: cmake --build build -j
        working-directory: core-engine
      - name: Operator e2e (edge → Java smoke)
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\ci-operator-e2e.ps1 -Seconds 6 -Rate 400 -MinFrames 80
      - name: Multi-edge stress (moderate)
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\soak-multiedge.ps1 -Seconds 6 -Rate 800 -Nodes 3
